function LogoMark({ size=48 }) {

    <div style={{background:"white",borderRadius:8,padding:2,display:"flex",alignItems:"center",justifyContent:"center",overflow:"hidden",flexShrink:0}}>
      <img src={LOGO_URL} alt="Uboussole" style={{height:size,width:"auto",objectFit:"contain",display:"block"}}/>
    </div>
  );
}
function LogoFull({ size="lg" }) {
  const h = size==="lg"?90:76;
  return (
    <div style={{background:"white",borderRadius:8,padding:"4px 8px",display:"inline-flex",alignItems:"center"}}>
      <img src={LOGO_URL} alt="Uboussole" style={{height:h,width:"auto",objectFit:"contain",display:"block"}}/>
    </div>
  );
}

function Card({children,style={}}) {
  return <div style={{background:C.white,borderRadius:14,padding:22,boxShadow:"0 2px 12px rgba(0,0,0,0.06)",...style}}>{children}</div>;
}
function STitle({children}) {
  return <h3 style={{margin:"0 0 16px",fontSize:"0.93rem",fontWeight:800,color:C.navy}}>{children}</h3>;
}
function Badge({label,bg,color}) {
  return <span style={{background:bg,color,fontSize:"0.7rem",fontWeight:700,padding:"3px 10px",borderRadius:20,whiteSpace:"nowrap"}}>{label}</span>;
}
function Btn({children,onClick,color=C.navy,outline=false,small=false,style={}}) {
  const bg = outline?"transparent":color;
  const cl = outline?color:"white";
  return (
    <button onClick={onClick} style={{background:bg,color:cl,border:`2px solid ${color}`,padding:small?"6px 14px":"10px 20px",borderRadius:10,fontSize:small?"0.78rem":"0.88rem",fontWeight:700,fontFamily:"inherit",cursor:"pointer",...style}}>
      {children}
    </button>
  );
}

function matchFAQ(input) {
  const q = input.toLowerCase();
  let best=null, score=0;
  for(const f of FAQ) {
    let s=0;
    for(const kw of f.kw) if(q.includes(kw)) s+=kw.split(" ").length;
    if(s>score){score=s;best=f;}
  }
  return score>0?best:null;
}
function BotText({text}) {
  return text.split(/(\*\*[^*]+\*\*|
)/g).map((p,i)=>{
    if(p.startsWith("**")&&p.endsWith("**")) return <strong key={i}>{p.slice(2,-2)}</strong>;
    if(p==="
") return <br key={i}/>;
    return p;
  });
}

// ─────────────────────────────────────────────────────────────────────────────
// LOGIN
// ─────────────────────────────────────────────────────────────────────────────
function Login({onLogin}) {
  const [email,setEmail]=useState("");
  const [pw,setPw]=useState("");
  const [err,setErr]=useState("");
  const [selected,setSelected]=useState(null);
  const portals=[
    {role:"student", label:"Portail Étudiant",    icon:"👩‍🎓",email:"etudiant@uemf.ma",       pw:"etudiant2024",color:C.green,bg:"#E8F5E9",desc:"Cours, documents, services campus"},
    {role:"staff",   label:"Portail Personnel",   icon:"👨‍💼",email:"personnel@uemf.ma",      pw:"staff2024",  color:C.amber,bg:"#FFF8E1",desc:"Réservations, achats, procédures"},
    {role:"admin",   label:"Administration",      icon:"👩‍💻",email:"admin@uemf.ma",          pw:"uemf2024",   color:C.red,  bg:"#FFEBEE",desc:"Gestion complète & statistiques"},
  ];
  function tryLogin(e){
    e.preventDefault();
    const u=ACCOUNTS[email];
    if(u&&u.pw===pw){onLogin(u);}
    else setErr("Identifiants incorrects.");
  }
  function quickLogin(p){setEmail(p.email);setPw(p.pw);setSelected(p.role);}
  return (
    <div style={{minHeight:"100vh",background:`linear-gradient(135deg,${C.navyDark} 0%,${C.navy} 55%,${C.navyLight} 100%)`,display:"flex",alignItems:"center",justifyContent:"center",fontFamily:"'Montserrat','Segoe UI',sans-serif",position:"relative",overflow:"hidden"}}>
      <div style={{position:"absolute",top:-100,right:-100,width:400,height:400,borderRadius:"50%",background:"rgba(76,175,80,0.1)"}}/>
      <div style={{position:"absolute",bottom:-80,left:-80,width:300,height:300,borderRadius:"50%",background:"rgba(255,255,255,0.04)"}}/>
      <div style={{position:"absolute",inset:0,backgroundImage:"radial-gradient(circle,rgba(255,255,255,0.05) 1px,transparent 1px)",backgroundSize:"28px 28px"}}/>
      <div style={{width:"100%",maxWidth:460,position:"relative",zIndex:1,padding:"0 16px"}}>
        <div style={{marginBottom:28,display:"flex",flexDirection:"column",alignItems:"center",gap:12}}>
          <div style={{background:"white",borderRadius:10,padding:"5px 10px",display:"inline-block"}}>
            <img src={LOGO_URL} alt="Uboussole" style={{height:140,width:"auto",objectFit:"contain",display:"block"}}/>
          </div>
          <p style={{color:"rgba(255,255,255,0.65)",fontSize:"0.9rem",margin:0,fontWeight:600,letterSpacing:"0.04em",textAlign:"center"}}>Portail de la Communauté Euromed de Fès</p>
        </div>
        {/* Portal selector */}
        <div style={{display:"grid",gridTemplateColumns:"1fr 1fr 1fr",gap:10,marginBottom:22}}>
          {portals.map(p=>(
            <button key={p.role} onClick={()=>quickLogin(p)} style={{padding:"14px 8px",borderRadius:12,border:`2px solid ${selected===p.role?p.color:"rgba(255,255,255,0.15)"}`,background:selected===p.role?`rgba(255,255,255,0.15)`:"rgba(255,255,255,0.06)",color:"white",cursor:"pointer",fontFamily:"inherit",transition:"all 0.2s",textAlign:"center"}}>
              <div style={{fontSize:"1.8rem",marginBottom:6}}>{p.icon}</div>
              <div style={{fontWeight:800,fontSize:"0.78rem",lineHeight:1.3}}>{p.label}</div>
              <div style={{fontSize:"0.65rem",color:"rgba(255,255,255,0.55)",marginTop:4,lineHeight:1.3}}>{p.desc}</div>
              {selected===p.role&&<div style={{marginTop:8,background:p.color,borderRadius:6,padding:"2px 0",fontSize:"0.65rem",fontWeight:800}}>✓ Sélectionné</div>}
            </button>
          ))}
        </div>
        <div style={{background:"white",borderRadius:20,padding:"32px 36px",boxShadow:"0 24px 80px rgba(0,0,0,0.3)"}}>
          <form onSubmit={tryLogin}>
            <div style={{marginBottom:18}}>
              <label style={{display:"block",fontSize:"0.72rem",fontWeight:700,color:C.navy,marginBottom:7,letterSpacing:"0.05em",textTransform:"uppercase"}}>Email</label>
              <input type="email" value={email} onChange={e=>setEmail(e.target.value)} placeholder="votre@uemf.ma" required style={{width:"100%",padding:"11px 14px",border:`2px solid ${C.gray200}`,borderRadius:10,fontSize:"0.92rem",fontFamily:"inherit",outline:"none",boxSizing:"border-box"}} onFocus={e=>e.target.style.borderColor=C.navy} onBlur={e=>e.target.style.borderColor=C.gray200}/>
            </div>
            <div style={{marginBottom:24}}>
              <label style={{display:"block",fontSize:"0.72rem",fontWeight:700,color:C.navy,marginBottom:7,letterSpacing:"0.05em",textTransform:"uppercase"}}>Mot de passe</label>
              <input type="password" value={pw} onChange={e=>setPw(e.target.value)} placeholder="••••••••" required style={{width:"100%",padding:"11px 14px",border:`2px solid ${C.gray200}`,borderRadius:10,fontSize:"0.92rem",fontFamily:"inherit",outline:"none",boxSizing:"border-box"}} onFocus={e=>e.target.style.borderColor=C.navy} onBlur={e=>e.target.style.borderColor=C.gray200}/>
            </div>
            {err&&<div style={{background:"#FFEBEE",color:"#C62828",padding:"9px 13px",borderRadius:8,fontSize:"0.83rem",marginBottom:18,border:"1px solid #FFCDD2"}}>{err}</div>}
            <button type="submit" style={{width:"100%",padding:"13px",background:`linear-gradient(135deg,${C.navy},${C.navyLight})`,color:"white",border:"none",borderRadius:12,fontSize:"0.95rem",fontWeight:800,fontFamily:"inherit",cursor:"pointer",boxShadow:"0 6px 20px rgba(27,58,107,0.35)",transition:"transform 0.15s"}}
              onMouseEnter={e=>e.target.style.transform="translateY(-1px)"} onMouseLeave={e=>e.target.style.transform=""}>Se connecter →</button>
          </form>
        </div>
      </div>
      <style>{`@import url('https://fonts.googleapis.com/css2?family=Montserrat:wght@400;500;600;700;800&display=swap');*{box-sizing:border-box;}`}</style>
    </div>
  );
}

// ─────────────────────────────────────────────────────────────────────────────
// ROOT
// ─────────────────────────────────────────────────────────────────────────────
function App() {
  const [user,setUser]=useState(null);
  if(!user) return <Login onLogin={setUser}/>;
  const logout=()=>setUser(null);
  if(user.role==="student") return <StudentPortal user={user} onLogout={logout}/>;
  if(user.role==="staff")   return <StaffPortal   user={user} onLogout={logout}/>;
  if(user.role==="rfstaff") return <RFStaffPortal user={user} onLogout={logout}/>;
  if(user.role==="admin")   return <AdminPortal   user={user} onLogout={logout}/>;
}
const root = ReactDOM.createRoot(document.getElementById('root'));
root.render(<App />);
  </script>
